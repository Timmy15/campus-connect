<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Campus Connect</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
	<link href="css/style.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

	<nav class="navbar navbar-dark navbar-expand-lg top-navbar fixed-top" aria-label="Top Navigation">
		<div class="container-fluid px-3">
			<a class="navbar-brand" href="#" id="brandLink">Campus Connect</a>

			<div class="d-flex align-items-center gap-3 ms-auto">
				<button class="btn btn-outline-light btn-sm" id="themeToggle" title="Toggle Dark Mode">
					<i class="bi bi-moon-stars-fill"></i>
				</button>

				<div class="text-white small" id="userInfoDisplay">
					Loading...
				</div>

				<button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
			</div>
		</div>
	</nav>

	<div class="container-fluid">
		<div class="row">
			<nav class="col-md-2 sidebar" aria-label="Main Sidebar">
				<ul class="nav flex-column">
					<li class="nav-item">
						<a class="nav-link active" href="#" id="nav-dashboard">Dashboard</a>
					</li>
					<li class="nav-item role-restricted" data-allowed="ADMIN">
						<a class="nav-link" href="#" id="nav-manage-clubs">Manage Clubs</a>
					</li>
					<li class="nav-item role-restricted" data-allowed="ADMIN">
						<a class="nav-link" href="#" id="nav-manage-events">Manage Events</a>
					</li>
					<li class="nav-item role-restricted" data-allowed="STUDENT">
						<a class="nav-link" href="#" id="nav-browse-clubs">Browse Clubs</a>
					</li>
					<li class="nav-item role-restricted" data-allowed="STUDENT">
						<a class="nav-link" href="#" id="nav-browse-events">Browse Events</a>
					</li>
					<li class="nav-item role-restricted" data-allowed="STUDENT">
						<a class="nav-link" href="#" id="nav-my-registrations">My Registrations</a>
					</li>

				</ul>
			</nav>

			<main class="col-md-10 main-content">
				<div id="app-root">
				</div>
			</main>
		</div>
	</div>

	<div id="modal-container"></div>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

	<script type="module" src="js/app.js"></script>

</body>

</html>
